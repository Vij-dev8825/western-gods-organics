<svg width="300" height="80" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Western Gods Organics">
  <defs>
    <linearGradient id="wgLeaf" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2e6b1f"/>
      <stop offset="55%" stop-color="#5aab35"/>
      <stop offset="100%" stop-color="#8fd05f"/>
    </linearGradient>
  </defs>

  <!-- mark: circled serif W with a leaf sweeping through it -->
  <g transform="translate(38,40)">
    <circle r="31" fill="none" stroke="#3d6b47" stroke-width="3"/>
    <text x="0" y="12" text-anchor="middle" font-family="'Fraunces','Georgia',serif" font-size="36" font-weight="600" fill="#3d6b47">W</text>
    <path d="M 3,-2 C 6,-12 14,-20 24,-23 C 23,-13 17,-4 7,-1 Z" fill="url(#wgLeaf)"/>
    <path d="M 5,-3 C 10,-10 16,-16 22,-20" fill="none" stroke="#e9f5df" stroke-width="1.1" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- wordmark -->
  <text x="78" y="34" font-family="'Fraunces','Georgia',serif" font-size="21" font-weight="600" letter-spacing="0.5" fill="#3d6b47">WESTERN GODS</text>
  <text x="79" y="54" font-family="'Work Sans','Arial',sans-serif" font-size="13" font-weight="600" letter-spacing="6" fill="#1f3d2b">ORGANICS</text>
  <text x="79" y="69" font-family="'Work Sans','Arial',sans-serif" font-size="8.5" letter-spacing="0.8" fill="#3d6b47">Directly from Farmers · Traditional Ways</text>
</svg>
